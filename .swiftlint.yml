included:
  - Sources
  - Tests

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicit_return
  - sorted_imports

line_length:
  warning: 140
  error: 180

type_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 1
    error: 1
  excluded:
    - id
    - mw
    - a
    - b
    - e
    - T
    - U
    - V

reporter: "xcode"
