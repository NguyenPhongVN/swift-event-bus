name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  swift-package:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE"
          fi
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: SwiftLint
        run: |
          if ! which swiftlint > /dev/null; then
            brew install swiftlint
          fi
          swiftlint --strict || true

  ios-simulator:
    name: Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE"
          fi
          swift --version

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -o '[A-F0-9-]\{36\}')
          if [ -n "$UDID" ]; then
            xcrun simctl boot "$UDID" || true
          fi

      - name: iOS test
        run: |
          xcodebuild test \
            -scheme EventBus-Package \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild test \
              -scheme EventBus-Package \
              -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
              CODE_SIGNING_ALLOWED=NO
