name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  swift-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: SwiftLint
        run: |
          brew update
          brew install swiftlint
          swiftlint --strict || true

      - name: Build
        run: swift build

      - name: Test with coverage
        run: swift test --enable-code-coverage

  ios-simulator:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: iOS test
        run: >
          xcodebuild test
          -scheme EventBus-Package
          -destination "platform=iOS Simulator,name=iPhone 16"
          CODE_SIGNING_ALLOWED=NO
